<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Animation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f0f0f0;
            overflow: hidden;
        }
        .road {
            position: absolute;
            bottom: 50px;
            width: 100%;
            height: 100px;
            background: #555;
        }
        .car {
            position: absolute;
            bottom: 60px;
            left: -100px;
            width: 100px;
            height: 50px;
            background: #ff3333;
            border-radius: 10px;
            animation: drive 8s linear infinite;
        }
        .car::before, .car::after {
            content: '';
            position: absolute;
            bottom: -15px;
            width: 20px;
            height: 20px;
            background: #222;
            border-radius: 50%;
        }
        .car::before { left: 10px; }
        .car::after { right: 10px; }
        @keyframes drive {
            0% { left: -100px; }
            100% { left: 100vw; }
        }
    </style>
</head>
<body>
    <div class="road"></div>
    <div class="car"></div>
</body>
</html>
